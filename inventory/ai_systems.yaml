# =============================================================================
# Argus AI System Inventory — the single source of truth for AI governance.
# Every AI system in the org MUST be registered here before deployment.
# Schema is validated by src/policy_engine.py; risk tier is computed by
# src/risk_tiering.py (EU AI Act Art. 5, Annex III, Art. 50 logic).
# =============================================================================

ai_systems:
  - id: AIS-001
    name: TalentRank Resume Screener
    owner: people-ops@acme.example
    business_unit: Human Resources
    purpose: Ranks inbound job applications and recommends candidates for interview.
    model_type: gradient-boosted classifier (in-house)
    role: provider          # provider | deployer (EU AI Act obligations differ)
    lifecycle_stage: production
    domain: employment      # drives Annex III high-risk classification
    interacts_with_humans: false
    generates_synthetic_content: false
    uses_personal_data: true
    automated_decision_no_human_review: false
    prohibited_practice: none
    human_oversight:
      documented: true
      mechanism: "Recruiter reviews every ranked shortlist before outreach"
    data_governance:
      training_data_documented: true
      provenance_recorded: true
      bias_evaluation_completed: true
      bias_evaluation_date: 2026-04-18
    transparency:
      users_notified_of_ai: true
      model_card_published: true
    robustness:
      accuracy_metrics_tracked: true
      adversarial_testing: false
    monitoring:
      logging_enabled: true
      log_retention_months: 12
      drift_monitoring: true
      incident_response_plan: true
    third_party:
      is_vendor_model: false
      vendor: null
      vendor_risk_assessment: null
    documentation:
      technical_documentation: true
      dpia_completed: true
      registered_in_eu_database: false   # gap — required for Annex III providers

